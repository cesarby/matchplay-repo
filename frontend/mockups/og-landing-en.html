<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1200, height=630" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700&family=Inter:wght@400;500&display=swap');

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 1200px;
        height: 630px;
        overflow: hidden;
        font-family: 'Inter', system-ui, sans-serif;
        background: #faf6ee;
        color: #1f1a14;
        position: relative;
      }

      .deco-circle {
        position: absolute;
        border-radius: 50%;
        opacity: 0.12;
      }
      .deco-1 {
        width: 420px;
        height: 420px;
        background: #c8362c;
        top: -120px;
        right: -80px;
      }
      .deco-2 {
        width: 280px;
        height: 280px;
        background: #1f6fb2;
        bottom: -100px;
        left: 60px;
      }
      .deco-3 {
        width: 160px;
        height: 160px;
        background: #2f8f4f;
        top: 80px;
        right: 320px;
        opacity: 0.08;
      }

      .wrapper {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        height: 100%;
        padding: 72px 80px;
        gap: 24px;
      }

      .logo-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 8px;
      }

      .logo-badge {
        width: 48px;
        height: 48px;
        background: #c8362c;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .logo-badge svg {
        width: 28px;
        height: 28px;
        fill: white;
      }

      .logo-name {
        font-family: 'Bricolage Grotesque', system-ui, sans-serif;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.3px;
        color: #1f1a14;
      }

      .eyebrow {
        font-size: 18px;
        font-weight: 500;
        color: #c8362c;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      h1 {
        font-family: 'Bricolage Grotesque', system-ui, sans-serif;
        font-size: 64px;
        font-weight: 700;
        line-height: 1.08;
        letter-spacing: -1.5px;
        color: #1f1a14;
        max-width: 760px;
      }

      h1 span {
        color: #c8362c;
      }

      .subtitle {
        font-size: 22px;
        line-height: 1.5;
        color: #6e614f;
        max-width: 620px;
      }

      .pills {
        display: flex;
        gap: 12px;
        margin-top: 8px;
      }

      .pill {
        padding: 10px 22px;
        border-radius: 100px;
        font-size: 16px;
        font-weight: 600;
      }

      .pill-red {
        background: #c8362c;
        color: white;
      }

      .pill-green {
        background: #e2f5e8;
        color: #2f8f4f;
        border: 1.5px solid #2f8f4f;
      }

      .right-panel {
        position: absolute;
        right: 64px;
        top: 50%;
        transform: translateY(-50%);
        width: 340px;
        background: white;
        border-radius: 20px;
        padding: 28px;
        box-shadow:
          0 1px 2px rgba(31, 26, 20, 0.06),
          0 8px 32px rgba(31, 26, 20, 0.1);
      }

      .card-chip-row {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }

      .chip {
        font-size: 12px;
        font-weight: 600;
        padding: 4px 12px;
        border-radius: 100px;
      }

      .chip-outline {
        border: 1.5px solid #e5dcc9;
        color: #6e614f;
      }

      .chip-green {
        background: #e2f5e8;
        color: #2f8f4f;
      }

      .card-title {
        font-family: 'Bricolage Grotesque', system-ui, sans-serif;
        font-size: 22px;
        font-weight: 700;
        color: #1f1a14;
        margin-bottom: 4px;
      }

      .card-meta {
        font-size: 13px;
        color: #6e614f;
        margin-bottom: 16px;
      }

      .board-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 4px;
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 16px;
      }

      .board-cell {
        aspect-ratio: 1;
        border-radius: 4px;
      }

      .c-r {
        background: #fce8e5;
      }
      .c-b {
        background: #e2f0fc;
      }
      .c-g {
        background: #e2f5e8;
      }
      .c-y {
        background: #fdf3db;
      }

      .card-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 13px;
        color: #6e614f;
      }

      .spots-badge {
        background: #e2f5e8;
        color: #2f8f4f;
        padding: 4px 10px;
        border-radius: 100px;
        font-size: 12px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="deco-circle deco-1"></div>
    <div class="deco-circle deco-2"></div>
    <div class="deco-circle deco-3"></div>

    <div class="wrapper">
      <div class="logo-row">
        <div class="logo-badge">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"
            />
          </svg>
        </div>
        <span class="logo-name">Matchplay</span>
      </div>

      <p class="eyebrow">Board games · Near you</p>

      <h1>Board game sessions<br /><span>near you</span></h1>

      <p class="subtitle">
        Discover open sessions, connect with players in your area and organise your next meetup.
      </p>

      <div class="pills">
        <span class="pill pill-red">Explore sessions</span>
        <span class="pill pill-green">Create free account</span>
      </div>
    </div>

    <div class="right-panel">
      <div class="card-chip-row">
        <span class="chip chip-outline">Your Session</span>
        <span class="chip chip-green">Open</span>
      </div>
      <p class="card-title">Catan Night</p>
      <p class="card-meta">Tonight's Table · + 1 Expansion · Madrid</p>

      <div class="board-grid">
        <div class="board-cell c-y"></div>
        <div class="board-cell c-r"></div>
        <div class="board-cell c-g"></div>
        <div class="board-cell c-b"></div>
        <div class="board-cell c-g"></div>
        <div class="board-cell c-b"></div>
        <div class="board-cell c-y"></div>
        <div class="board-cell c-r"></div>
        <div class="board-cell c-r"></div>
        <div class="board-cell c-g"></div>
        <div class="board-cell c-b"></div>
        <div class="board-cell c-y"></div>
      </div>

      <div class="card-footer">
        <span>Today · 20:00</span>
        <span class="spots-badge">3 / 4 spots</span>
      </div>
    </div>
  </body>
</html>
