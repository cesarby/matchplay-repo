# Perfil de test — H2 in-memory, sin .env, sin MySQL
spring.datasource.url=jdbc:h2:mem:matchplay_test;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# JWT — secret de test, 64+ caracteres
app.jwt.secret=test-secret-key-at-least-64-characters-long-for-hmac-sha-512-algorithm
app.jwt.expiration-ms=3600000
app.jwt.refresh-expiration-ms=86400000

# CORS
app.cors.allowed-origins=http://localhost:5173

# Refresh cookie: en tests secure=false (MockMvc no usa HTTPS)
app.auth.refresh-cookie.secure=false
app.auth.refresh-cookie.max-age-seconds=86400

# BGG (no se usa en tests pero el bean requiere las props)
app.bgg.base-url=https://example.test/xmlapi2
app.bgg.user-agent=matchplay-test/1.0
app.bgg.token=test-token
app.bgg.connect-timeout-ms=1000
app.bgg.read-timeout-ms=2000

# Logging
logging.level.root=WARN
logging.level.com.matchplay=INFO
