# Base de datos
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA — validate comprueba que las entidades coincidan con el esquema pero no lo altera
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway — versionado de schema. La BD actual queda como baseline V1 (estado pre-Flyway).
# Cualquier migración nueva va como V2__, V3__... en classpath:db/migration.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.baseline-description=baseline (schema previo a Flyway)
spring.flyway.locations=classpath:db/migration

# Logging
logging.level.root=WARN
logging.level.com.matchplay=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Refresh cookie: en dev http://localhost no admite Secure
app.auth.refresh-cookie.secure=false
