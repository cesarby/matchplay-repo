spring.application.name=matchplay-backend
server.port=8080

# Perfil activo por defecto
spring.profiles.active=${SPRING_PROFILE:dev}

# Jackson
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# Mensajes i18n
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# Error — nunca exponer stacktrace ni detalles internos
server.error.include-stacktrace=never
server.error.include-message=never

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# Refresh token cookie (httpOnly Secure SameSite=Strict)
# En dev/test: secure=false porque http://localhost. En prod: secure=true (HTTPS obligatorio)
app.auth.refresh-cookie.name=refresh_token
app.auth.refresh-cookie.path=/api/v1/auth
app.auth.refresh-cookie.same-site=Strict
app.auth.refresh-cookie.secure=${REFRESH_COOKIE_SECURE:true}
app.auth.refresh-cookie.max-age-seconds=${REFRESH_COOKIE_MAX_AGE_SECONDS:604800}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# BoardGameGeek API
app.bgg.base-url=${BGG_API_BASE_URL:https://boardgamegeek.com/xmlapi2}
app.bgg.user-agent=${BGG_API_USER_AGENT}
app.bgg.token=${BGG_API_TOKEN}
app.bgg.connect-timeout-ms=${BGG_CONNECT_TIMEOUT_MS:5000}
app.bgg.read-timeout-ms=${BGG_READ_TIMEOUT_MS:15000}

# Anthropic Claude API — opcional, NoopSummaryClient si no está configurada
anthropic.api-key=${ANTHROPIC_API_KEY:}
